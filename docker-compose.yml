services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: notarion-mongodb
    restart: unless-stopped
    # Bind to localhost only for security — remove if external access needed
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - notarion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Local IPFS Node
  ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: notarion-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001" # p2p swarm
      - "4001:4001/udp"
      # IPFS API removed from host exposure for security — accessed via internal Docker network
      - "8080:8080" # Gateway
    environment:
      - IPFS_PROFILE=server
      - IPFS_PATH=/data/ipfs
      # Allow CORS from frontend and backend
      - IPFS_CORS_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:5002}
    command: >
      daemon --migrate
      --routing=dhtclient
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - notarion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: notarion-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5002}:5002"
    environment:
      PORT: ${PORT:-5002}
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/ipfs-upload?authSource=admin
      IPFS_API_URL: ${IPFS_API_URL:-http://ipfs:5001}
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL:-http://ipfs:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      IPFS_RATE_LIMIT_WINDOW_MS: ${IPFS_RATE_LIMIT_WINDOW_MS:-900000}
      IPFS_RATE_LIMIT_MAX_REQUESTS: ${IPFS_RATE_LIMIT_MAX_REQUESTS:-10}
      TZ: ${TZ:-Europe/Rome}
      ETH_NETWORK: ${ETH_NETWORK:-sepolia}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - notarion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend Application
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost:5002}
        VITE_IPFS_GATEWAY_URL: ${VITE_IPFS_GATEWAY_URL:-http://localhost:8080}
    container_name: notarion-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - notarion-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  ipfs_data:
    driver: local

networks:
  notarion-network:
    driver: bridge
